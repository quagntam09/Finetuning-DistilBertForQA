model_name: distilbert-base-multilingual-cased
dropout_rate: 0.1
freeze_encoder: false
question_column: question
context_column: context
answers_column: answers
impossible_column: is_impossible
plausible_answers_column: plausible_answers
max_length: 384
doc_stride: 128
padding: max_length
use_vietnamese_segmentation: true
segmentation_tool: underthesea
batch_size: 16
epochs: 3
learning_rate: 1.0e-05
weight_decay: 0.01
use_question_group_sampler: true
question_group_sampling_power: 0.5
early_stopping_patience: 3
early_stopping_min_delta: 0.001
warmup_ratio: 0.1
max_grad_norm: 1.0
gradient_accumulation_steps: 1
num_workers: 2
pin_memory: true
persistent_workers: true
prefetch_factor: 2
use_amp: true
use_tf32: true
force_cpu: false
eval_strategy: epoch
save_strategy: epoch
track_eval_metrics: true
tune_no_answer_threshold: false
no_answer_threshold: 0.0
answer_only: false
save_best_model: true
best_metric: f1
load_best_model: true
generate_eda: true
eda_output_dir: outputs/eda
output_dir: outputs/checkpoints_en
artifact_dir: artifacts/readers/en
artifact_name: en
onnx_opset_version: 14
seed: 42
logging_steps: 100
log_level: info
lora_r: 8
lora_alpha: 16
lora_target_modules:
- q_lin
- v_lin
- k_lin
- out_lin
lora_dropout: 0.05
lora_bias: none
train_file: data/filtered_en/data_en_train_filtered.jsonl
validation_file: data/filtered_en/data_en_validation_filtered.jsonl
profile_name: train_en
init_checkpoint_dir: null
test_file: null
cache_dir: null
