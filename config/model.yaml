defaults:
  model_name: distilbert-base-multilingual-cased
  init_checkpoint_dir: null
  dropout_rate: 0.1
  freeze_encoder: false

  dataset_name: null
  dataset_config_name: null
  train_file: null
  validation_file: null
  test_file: null

  question_column: question
  context_column: context
  answers_column: answers
  impossible_column: is_impossible
  plausible_answers_column: plausible_answers

  max_length: 384
  doc_stride: 128
  padding: max_length
  cache_dir: null
  use_vietnamese_segmentation: true
  segmentation_tool: underthesea

  batch_size: 16
  epochs: 2
  learning_rate: 3.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  gradient_accumulation_steps: 1

  num_workers: 2
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  use_amp: true
  use_tf32: true
  force_cpu: false

  eval_steps: null
  save_steps: null
  eval_strategy: epoch
  save_strategy: epoch
  save_best_model: true
  best_metric: f1
  load_best_model: true

  output_dir: outputs/checkpoints
  artifact_dir: artifacts/readers/run_best
  artifact_name: run_best
  onnx_opset_version: 14
  seed: 42
  logging_steps: 100
  log_level: info

  lora_r: 8
  lora_alpha: 16
  lora_target_modules: ["q_lin", "v_lin", "k_lin", "out_lin"]
  lora_dropout: 0.05
  lora_bias: "none"

default_profile: train_vi

profiles:
  train_vi:
    train_file: data/stage2_vi_train.jsonl
    validation_file: data/stage2_vi_validation.jsonl
    epochs: 10
    learning_rate: 1.0e-5
    output_dir: outputs/checkpoints_vi
    artifact_dir: artifacts/readers/vi
    artifact_name: vi

  train_en:
    train_file: data/stage1_en_train.jsonl
    validation_file: data/stage1_en_validation.jsonl
    epochs: 5
    learning_rate: 3.0e-5
    output_dir: outputs/checkpoints_en
    artifact_dir: artifacts/readers/en
    artifact_name: en

  train_mixed:
    train_file: data/stage1_train.jsonl
    validation_file: data/stage1_validation.jsonl
    epochs: 10
    learning_rate: 3.0e-5
    output_dir: outputs/checkpoints_stage1_mixed
    artifact_dir: artifacts/readers/stage1_mixed
    artifact_name: stage1_mixed

  train_stage2_vi_from_mixed:
    init_checkpoint_dir: outputs/checkpoints_stage1_mixed/best_model
    train_file: data/stage2_vi_train.jsonl
    validation_file: data/stage2_vi_validation.jsonl
    epochs: 10
    learning_rate: 1.0e-5
    output_dir: outputs/checkpoints_stage2_vi
    artifact_dir: artifacts/readers/stage2_vi
    artifact_name: stage2_vi

  eval_vi:
    train_file: null
    validation_file: data/eval_vi_validation.jsonl
    output_dir: outputs/checkpoints_eval_vi
    artifact_dir: artifacts/readers/eval_vi
    artifact_name: eval_vi

  eval_en:
    train_file: null
    validation_file: data/eval_en_validation.jsonl
    output_dir: outputs/checkpoints_eval_en
    artifact_dir: artifacts/readers/eval_en
    artifact_name: eval_en
