defaults:
  model_name: distilbert-base-multilingual-cased
  dropout_rate: 0.1
  freeze_encoder: false

  question_column: question
  context_column: context
  answers_column: answers
  impossible_column: is_impossible
  plausible_answers_column: plausible_answers

  max_length: 384
  doc_stride: 128
  padding: max_length
  use_vietnamese_segmentation: true
  segmentation_tool: underthesea

  batch_size: 16
  epochs: 2
  learning_rate: 3.0e-5
  weight_decay: 0.01
  use_question_group_sampler: true
  question_group_sampling_power: 0.5
  early_stopping_patience: 3
  early_stopping_min_delta: 0.001
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  gradient_accumulation_steps: 1

  num_workers: 2
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  use_amp: true
  use_tf32: true
  force_cpu: false

  eval_strategy: epoch
  save_strategy: epoch
  track_eval_metrics: true
  tune_no_answer_threshold: true
  no_answer_threshold: 0.0
  answer_only: false
  save_best_model: true
  best_metric: f1
  load_best_model: true

  generate_eda: true
  eda_output_dir: outputs/eda
  output_dir: outputs/checkpoints
  artifact_dir: artifacts/readers/run_best
  artifact_name: run_best
  onnx_opset_version: 14
  seed: 42
  logging_steps: 100
  log_level: info

default_profile: train_vi
default_pipeline_profiles:
  - train_en
  - train_vi_from_en
profiles:
  train_vi:
    train_file: data/filtered_vi/data_vi_train_filtered.jsonl
    validation_file: data/filtered_vi/data_vi_validation_filtered.jsonl
    epochs: 10
    learning_rate: 1.0e-5
    output_dir: outputs/checkpoints_vi
    artifact_dir: artifacts/readers/vi
    artifact_name: vi

  train_en:
    train_file: data/filtered_en/data_en_train_filtered.jsonl
    validation_file: data/filtered_en/data_en_validation_filtered.jsonl
    epochs: 3
    learning_rate: 1.0e-5
    output_dir: outputs/checkpoints_en
    artifact_dir: artifacts/readers/en
    artifact_name: en
    
  eval_vi:
    validation_file: data/filtered_vi/data_vi_validation_filtered.jsonl
    output_dir: outputs/checkpoints_eval_vi
    artifact_dir: artifacts/readers/eval_vi
    artifact_name: eval_vi

  eval_en:
    validation_file: data/filtered_en/data_en_validation_filtered.jsonl
    output_dir: outputs/checkpoints_eval_en
    artifact_dir: artifacts/readers/eval_en
    artifact_name: eval_en

  train_vi_from_en:
    init_checkpoint_dir: outputs/checkpoints_en/best_model
    train_file: data/filtered_vi/data_vi_train_filtered.jsonl
    validation_file: data/filtered_vi/data_vi_validation_filtered.jsonl
    epochs: 7
    learning_rate: 1.0e-5
    output_dir: outputs/checkpoints_vi_from_en

  train_vi_from_en_answer_only:
    init_checkpoint_dir: outputs/checkpoints_en/best_model
    train_file: data/filtered_vi/data_vi_train_filtered.jsonl
    validation_file: data/filtered_vi/data_vi_validation_filtered.jsonl
    epochs: 2
    learning_rate: 1.0e-5
    answer_only: true
    tune_no_answer_threshold: false
    no_answer_threshold: -1000000000.0
    output_dir: outputs/checkpoints_vi_from_en_answer_only

  train_vi_answer_only:
    train_file: data/filtered_vi/data_vi_train_filtered.jsonl
    validation_file: data/filtered_vi/data_vi_validation_filtered.jsonl
    epochs: 2
    learning_rate: 1.0e-5
    answer_only: true
    tune_no_answer_threshold: false
    no_answer_threshold: -1000000000.0
    output_dir: outputs/checkpoints_vi_answer_only

  train_en_from_vi:
    init_checkpoint_dir: outputs/checkpoints_vi/best_model
    train_file: data/filtered_en/data_en_train_filtered.jsonl
    validation_file: data/filtered_en/data_en_validation_filtered.jsonl
    epochs: 5
    learning_rate: 3.0e-5
    output_dir: outputs/checkpoints_en_from_vi

  eval_vi_test:
    test_file: data/filtered_vi/data_vi_test_filtered.jsonl
    output_dir: outputs/eval_vi_test
    artifact_dir: artifacts/readers/eval_vi_test
    artifact_name: eval_vi_test

  train_en_from_vi_eval_vi:
    init_checkpoint_dir: outputs/checkpoints_vi/best_model
    train_file: data/filtered_en/data_en_train_filtered.jsonl
    validation_file: data/filtered_vi/data_vi_validation_filtered.jsonl
    epochs: 5
    learning_rate: 3.0e-5
    output_dir: outputs/checkpoints_en_from_vi_eval_vi
    artifact_dir: artifacts/readers/en_from_vi_eval_vi
    artifact_name: en_from_vi_eval_vi
